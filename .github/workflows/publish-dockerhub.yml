name: publish-dockerhub
on:
  push:
    tags:
      - 'v*' # Trigger the workflow when a tag starting with "v" is pushed

jobs:
  publish-dockerhub-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning (amd64, into daemon)
        run: |
          docker buildx create --use
          docker buildx build --load -t random-mcp-server:scan .

      - name: Trivy scan (fail on fixable CRITICAL/HIGH before push)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: random-mcp-server:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Build and push Docker image to Docker Hub
        run: |
          tag=${GITHUB_REF#refs/tags/}
          tag=${tag:1}
          image=docker.io/mitchallen/random-mcp-server
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${image}:${tag} \
            -t ${image}:latest \
            --push .

      - name: Smoke-test the published image
        run: |
          tag=${GITHUB_REF#refs/tags/}
          tag=${tag:1}
          make docker-test REGISTRY=docker.io/mitchallen TAG=${tag}

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mitchallen/random-mcp-server
          readme-filepath: ./README.md
