name: dependabot-auto-merge
# Auto-merges low-risk Dependabot PRs once the required CI checks pass.
# Native auto-merge waits for the branch-protection checks on main (unit + bdd),
# so a bump only lands if the workflows still go green. Scope:
#   - github-actions: all updates (CI-only, low blast radius).
#   - docker / pip:   minor + patch only — major bumps stay manual for review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for in-scope updates
        if: >-
          startsWith(steps.metadata.outputs.package-ecosystem, 'github')
          || ( (steps.metadata.outputs.package-ecosystem == 'docker'
          || steps.metadata.outputs.package-ecosystem == 'pip')
          && (steps.metadata.outputs.update-type == 'version-update:semver-minor'
          || steps.metadata.outputs.update-type == 'version-update:semver-patch') )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
