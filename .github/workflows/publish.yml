name: publish
on:
  push:
    tags:
      - 'v*' # Trigger the workflow when a tag starting with "v" is pushed

jobs:
  publish-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for scanning (amd64, into daemon)
        run: |
          docker buildx create --use
          docker buildx build --load -t random-mcp-server:scan .

      - name: Trivy scan (fail on fixable CRITICAL/HIGH before push)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: random-mcp-server:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Build and push the Docker image
        run: |
          tag=${GITHUB_REF#refs/tags/}
          tag=${tag:1}
          image=ghcr.io/${GITHUB_REPOSITORY}
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${image}:${tag} \
            -t ${image}:latest \
            --push .

      - name: Smoke-test the published image
        run: |
          tag=${GITHUB_REF#refs/tags/}
          tag=${tag:1}
          make docker-test REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER} TAG=${tag}
