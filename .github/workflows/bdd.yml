name: bdd
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run BDD scenarios
        run: uv run pytest tests/test_bdd.py
