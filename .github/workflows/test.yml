name: test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: test (${{ matrix.suite }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Unit tests: everything except the BDD module.
          - suite: unit
            args: --ignore=tests/test_bdd.py
          # BDD scenarios (pytest-bdd) run on their own.
          - suite: bdd
            args: tests/test_bdd.py
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run ${{ matrix.suite }} tests
        run: uv run pytest ${{ matrix.args }}
